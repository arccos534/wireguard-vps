{% extends "base.html" %}

{% block content %}
  <section class="login-wrap">
    <div class="login-card">
      <p class="eyebrow">WireGuard Deck</p>
      <h1>Unlock the control room</h1>
      <p class="lede">
        Create peers, revoke access, download configs, and keep the VPN box tidy from one place.
      </p>
      <form method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label class="field">
          <span>Admin password</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="button button-primary">Enter Panel</button>
      </form>
      <p class="hint">
        Port {{ panel_port }}{% if panel_url %} · {{ panel_url }}{% endif %}
      </p>
    </div>
  </section>
{% endblock %}
